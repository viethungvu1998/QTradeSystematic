base_config: ../factor/base.yaml
workflow: research
asset_types: [stock]
universe:
  stock: [AAPL, MSFT, GOOGL, AMZN, META]
start_date: "2022-01-01"
end_date: "2024-12-31"
initial_capital: 100000
data_sources:
  stock: fmp
storage: duckdb
features:
  transforms:
    - name: qsmom
      params: {roc_fast_period: 21, roc_slow_period: 252, returns_period: 126}
  indicators:
    - name: rsi
      params: {periods: [14]}
    - name: roc
      params: {periods: [21]}
  forward_returns:
    periods: [21]
strategy:
  type: ml_factor
  params:
    task: classification
    min_train_rows: 20
    predictor_cols: [close_qsmom_21_252_126, rsi_14, roc_21]
    target_col: forward_return_21
    model:
      name: xgb_classifier
      params:
        n_estimators: 50
        max_depth: 3
        learning_rate: 0.05
        subsample: 0.85
        colsample_bytree: 0.85
        eval_metric: mlogloss
        random_state: 42
        n_jobs: -1
portfolio_construction:
  name: equal_weight
  params:
    num_long_positions: 3
    num_short_positions: 0
validation:
  method: single_split
  test_start_date: "2024-01-01"
backtest_engine: vectorbt
rebalance: 10
train_window: 252
